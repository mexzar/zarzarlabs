// ===================== UTILITIES =====================
function rand(a,b){return a+Math.random()*(b-a)}
function randInt(a,b){return Math.floor(rand(a,b+1))}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v))}
function lerp(a,b,t){return a+(b-a)*t}
function dist2D(x1,z1,x2,z2){const dx=x1-x2,dz=z1-z2;return Math.sqrt(dx*dx+dz*dz)}

// ===================== INIT THREE.JS =====================
function initThree(){
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x667788);
  scene.fog = new THREE.Fog(0x667788,40,120);

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 200);
  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  document.body.appendChild(renderer.domElement);

  const hemi = new THREE.HemisphereLight(0x88aacc,0x445533,0.6);
  scene.add(hemi);
  const sun = new THREE.DirectionalLight(0xffeedd,1.2);
  sun.position.set(30,50,20);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048,2048);
  sun.shadow.camera.left = -MAP_SIZE; sun.shadow.camera.right = MAP_SIZE;
  sun.shadow.camera.top = MAP_SIZE; sun.shadow.camera.bottom = -MAP_SIZE;
  sun.shadow.camera.near = 1; sun.shadow.camera.far = 150;
  sun.shadow.bias = -0.001;
  scene.add(sun);
  const fill = new THREE.DirectionalLight(0x8899bb,0.3);
  fill.position.set(-20,20,-10);
  scene.add(fill);

  clock = new THREE.Clock();

  // Weapon group attached to camera
  weaponGroup = new THREE.Group();
  camera.add(weaponGroup);
  scene.add(camera);

  window.addEventListener('resize',()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
  });
}

// ===================== TEXTURES =====================
function makeCanvasTex(w,h,fn){
  const c=document.createElement('canvas');c.width=w;c.height=h;
  const ctx=c.getContext('2d');fn(ctx,w,h);
  const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;return t;
}

let texGround, texConcrete, texMetal, texCamo, texSand, texBrick;
function initTextures(){
  texGround = makeCanvasTex(128,128,(ctx,w,h)=>{
    ctx.fillStyle='#6b7b5a';ctx.fillRect(0,0,w,h);
    for(let i=0;i<2000;i++){ctx.fillStyle=`rgba(${randInt(80,120)},${randInt(100,140)},${randInt(70,100)},0.3)`;ctx.fillRect(rand(0,w),rand(0,h),rand(1,3),rand(1,3))}
  });
  texConcrete = makeCanvasTex(64,64,(ctx,w,h)=>{
    ctx.fillStyle='#888';ctx.fillRect(0,0,w,h);
    for(let i=0;i<500;i++){ctx.fillStyle=`rgba(${randInt(100,160)},${randInt(100,160)},${randInt(100,160)},0.3)`;ctx.fillRect(rand(0,w),rand(0,h),rand(1,4),rand(1,4))}
  });
  texMetal = makeCanvasTex(64,64,(ctx,w,h)=>{
    ctx.fillStyle='#555';ctx.fillRect(0,0,w,h);
    for(let y=0;y<h;y+=4){ctx.fillStyle=`rgba(${randInt(60,100)},${randInt(60,100)},${randInt(60,100)},0.5)`;ctx.fillRect(0,y,w,2)}
  });
  texCamo = makeCanvasTex(64,64,(ctx,w,h)=>{
    ctx.fillStyle='#5a6b4a';ctx.fillRect(0,0,w,h);
    for(let i=0;i<30;i++){ctx.fillStyle=['#4a5a3a','#6b7b5a','#3a4a2a','#7b8b6a'][randInt(0,3)];ctx.beginPath();ctx.arc(rand(0,w),rand(0,h),rand(4,12),0,Math.PI*2);ctx.fill()}
  });
  texSand = makeCanvasTex(64,64,(ctx,w,h)=>{
    ctx.fillStyle='#b8a88a';ctx.fillRect(0,0,w,h);
    for(let i=0;i<500;i++){ctx.fillStyle=`rgba(${randInt(160,200)},${randInt(150,180)},${randInt(120,150)},0.3)`;ctx.fillRect(rand(0,w),rand(0,h),rand(1,3),rand(1,3))}
  });
  texBrick = makeCanvasTex(64,64,(ctx,w,h)=>{
    ctx.fillStyle='#6a4a3a';ctx.fillRect(0,0,w,h);
    ctx.fillStyle='#554030';
    for(let y=0;y<h;y+=8){for(let x=(y%16===0?0:8);x<w;x+=16){ctx.fillRect(x,y,15,7)}}
    ctx.fillStyle='#5a4535';for(let y=0;y<h;y+=8){ctx.fillRect(0,y,w,1)}
  });
}

// ===================== MAP GENERATION =====================
function generateMap(){
  // Ground
  const groundMat = new THREE.MeshStandardMaterial({map:texGround,roughness:0.9});
  texGround.repeat.set(20,20);
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(MAP_SIZE*2,MAP_SIZE*2),groundMat);
  ground.rotation.x=-Math.PI/2;ground.receiveShadow=true;
  scene.add(ground);

  // Perimeter walls
  const wallMat = new THREE.MeshStandardMaterial({map:texConcrete,roughness:0.8});
  const wallH=3, wallT=0.5;
  const makeWall=(x,z,w,d)=>{
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,wallH,d),wallMat);
    m.position.set(x,wallH/2,z);m.castShadow=true;m.receiveShadow=true;
    scene.add(m);addCollidable(m,x-w/2,z-d/2,x+w/2,z+d/2,wallH);
  };
  makeWall(0,MAP_HALF,MAP_SIZE*2,wallT);
  makeWall(0,-MAP_HALF,MAP_SIZE*2,wallT);
  makeWall(MAP_HALF,0,wallT,MAP_SIZE*2);
  makeWall(-MAP_HALF,0,wallT,MAP_SIZE*2);

  const brickMat = new THREE.MeshStandardMaterial({map:texBrick,roughness:0.85});
  const metalMat = new THREE.MeshStandardMaterial({map:texMetal,roughness:0.5,metalness:0.3});
  const sandMat = new THREE.MeshStandardMaterial({map:texSand,roughness:0.9});
  const camoMat = new THREE.MeshStandardMaterial({map:texCamo,roughness:0.8});

  // Helper: box building with optional door
  function makeBuilding(x,z,w,d,h,mat,doorSide){
    const g = new THREE.Group();
    const thick = 0.4;
    // front wall
    if(doorSide!=='front'){
      const fw=new THREE.Mesh(new THREE.BoxGeometry(w,h,thick),mat);fw.position.set(0,h/2,d/2);fw.castShadow=true;fw.receiveShadow=true;g.add(fw);
    } else {
      const dw=1.2;
      const lw=new THREE.Mesh(new THREE.BoxGeometry((w-dw)/2,h,thick),mat);lw.position.set(-(w+dw)/4,h/2,d/2);lw.castShadow=true;g.add(lw);
      const rw=new THREE.Mesh(new THREE.BoxGeometry((w-dw)/2,h,thick),mat);rw.position.set((w+dw)/4,h/2,d/2);rw.castShadow=true;g.add(rw);
      const tw=new THREE.Mesh(new THREE.BoxGeometry(dw,h-2.2,thick),mat);tw.position.set(0,h-((h-2.2)/2),d/2);tw.castShadow=true;g.add(tw);
    }
    // back wall
    if(doorSide!=='back'){

function addCollidable(obj,minX,minZ,maxX,maxZ,h){
  collidables.push({obj,minX,minZ,maxX,maxZ,h:h||3});
  // Add to spatial grid
  const cx1=Math.floor(minX/CELL_SIZE),cz1=Math.floor(minZ/CELL_SIZE);
  const cx2=Math.floor(maxX/CELL_SIZE),cz2=Math.floor(maxZ/CELL_SIZE);
  for(let cx=cx1;cx<=cx2;cx++)for(let cz=cz1;cz<=cz2;cz++){
    const key=cx+','+cz;
    if(!spatialGrid[key])spatialGrid[key]=[];
    spatialGrid[key].push(collidables.length-1);
  }
}

function getCollidablesNear(x,z){
  const key=Math.floor(x/CELL_SIZE)+','+Math.floor(z/CELL_SIZE);
  const indices = spatialGrid[key]||[];
  return indices.map(i=>collidables[i]);
}

// ===================== PARTICLES =====================
function initParticles(){
  pPos = new Float32Array(MAX_PARTICLES*3);
  pCol = new Float32Array(MAX_PARTICLES*3);
  for(let i=0;i<MAX_PARTICLES;i++){pPos[i*3+1]=-999;pLife.push(0);pMaxLife.push(0);pVel.push({x:0,y:0,z:0})}
  particleGeo = new THREE.BufferGeometry();
  particleGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
  particleGeo.setAttribute('color',new THREE.BufferAttribute(pCol,3));
  particleMat = new THREE.PointsMaterial({size:0.15,vertexColors:true,transparent:true,opacity:0.8,depthWrite:false});
  particleMesh = new THREE.Points(particleGeo,particleMat);
  particleMesh.frustumCulled=false;
  scene.add(particleMesh);
}

let pIndex=0;
function spawnParticle(x,y,z,vx,vy,vz,r,g,b,life){
  const i=pIndex;pIndex=(pIndex+1)%MAX_PARTICLES;
  pPos[i*3]=x;pPos[i*3+1]=y;pPos[i*3+2]=z;
  pCol[i*3]=r;pCol[i*3+1]=g;pCol[i*3+2]=b;
  pVel[i]={x:vx,y:vy,z:vz};pLife[i]=life;pMaxLife[i]=life;
}

function spawnParticles(x,y,z,type,count){
  for(let i=0;i<count;i++){
    let vx=rand(-2,2),vy=rand(0,4),vz=rand(-2,2),r=1,g=1,b=1,life=rand(0.3,0.8);
    switch(type){
      case'muzzleFlash':vx=rand(-1,1);vy=rand(-1,1);vz=rand(-1,1);r=1;g=0.9;b=0.3;life=0.05;break;
      case'blood':r=0.8;g=0.05;b=0.05;vy=rand(1,5);life=rand(0.3,0.7);break;
      case'explosion':r=1;g=rand(0.3,0.7);b=0;vy=rand(3,10);vx=rand(-5,5);vz=rand(-5,5);life=rand(0.5,1.2);break;
      case'smoke':r=0.4;g=0.4;b=0.4;vy=rand(1,3);vx*=0.5;vz*=0.5;life=rand(1,2.5);break;
      case'impact':r=0.8;g=0.7;b=0.5;vy=rand(0,2);life=rand(0.1,0.4);break;
      case'spark':r=1;g=1;b=0.5;vy=rand(1,3);life=rand(0.1,0.3);break;
      case'brass':vx=rand(1,3);vy=rand(2,4);vz=rand(-1,1);r=0.9;g=0.7;b=0.2;life=rand(0.5,1);break;
    }
    spawnParticle(x,y,z,vx,vy,vz,r,g,b,life);
  }
}

function updateParticles(dt){
  for(let i=0;i<MAX_PARTICLES;i++){
    if(pLife[i]<=0)continue;
    pLife[i]-=dt;
    if(pLife[i]<=0){pPos[i*3+1]=-999;continue}
    pPos[i*3]+=pVel[i].x*dt;
    pPos[i*3+1]+=pVel[i].y*dt;
    pPos[i*3+2]+=pVel[i].z*dt;
    pVel[i].y-=10*dt;
    if(pPos[i*3+1]<0){pPos[i*3+1]=0;pVel[i].y*=-0.3;pVel[i].x*=0.5;pVel[i].z*=0.5}
    const fade=pLife[i]/pMaxLife[i];
    pCol[i*3]*=0.99;pCol[i*3+1]*=0.99;pCol[i*3+2]*=0.99;
  }
  particleGeo.attributes.position.needsUpdate=true;
  particleGeo.attributes.color.needsUpdate=true;
}

// ===================== AUDIO =====================
function initAudio(){
  try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();masterGain=audioCtx.createGain();masterGain.gain.value=0.3;masterGain.connect(audioCtx.destination)}catch(e){}
}

function playSound(type,vol=1){
  if(!audioCtx)return;
  try{
    const g=audioCtx.createGain();g.gain.value=vol*0.3;g.connect(masterGain);
    const now=audioCtx.currentTime;
    switch(type){
      case'pistol':{const o=audioCtx.createOscillator();const n=makeNoise(0.1);o.type='square';o.frequency.setValueAtTime(800,now);o.frequency.exponentialRampToValueAtTime(200,now+0.08);o.connect(g);n.connect(g);o.start(now);o.stop(now+0.08);break}
      case'smg':{const n=makeNoise(0.06);n.connect(g);break}
      case'shotgun':{const n=makeNoise(0.2);const o=audioCtx.createOscillator();o.type='sawtooth';o.frequency.value=150;o.connect(g);o.start(now);o.stop(now+0.15);n.connect(g);break}
      case'rifle':{const n=makeNoise(0.12);const o=audioCtx.createOscillator();o.frequency.setValueAtTime(600,now);o.frequency.exponentialRampToValueAtTime(100,now+0.1);o.connect(g);o.start(now);o.stop(now+0.1);n.connect(g);break}
      case'sniper':{const n=makeNoise(0.25);const o=audioCtx.createOscillator();o.frequency.setValueAtTime(1200,now);o.frequency.exponentialRampToValueAtTime(80,now+0.2);o.connect(g);o.start(now);o.stop(now+0.2);n.connect(g);break}
      case'heavy':{const n=makeNoise(0.3);const o=audioCtx.createOscillator();o.type='sawtooth';o.frequency.value=80;o.connect(g);o.start(now);o.stop(now+0.25);n.connect(g);break}
      case'explosion':{const n=makeNoise(0.8);const o=audioCtx.createOscillator();o.type='sine';o.frequency.setValueAtTime(200,now);o.frequency.exponentialRampToValueAtTime(30,now+0.6);o.connect(g);o.start(now);o.stop(now+0.8);n.connect(g);g.gain.setValueAtTime(vol*0.5,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.8);break}
      case'hit':{const o=audioCtx.createOscillator();o.frequency.value=300;o.connect(g);o.start(now);o.stop(now+0.05);break}
      case'kill':{const o=audioCtx.createOscillator();o.frequency.setValueAtTime(600,now);o.frequency.exponentialRampToValueAtTime(1200,now+0.1);o.connect(g);o.start(now);o.stop(now+0.12);break}
      case'reload':{const o=audioCtx.createOscillator();o.frequency.value=1000;o.connect(g);o.start(now);o.stop(now+0.05);const o2=audioCtx.createOscillator();o2.frequency.value=800;o2.connect(g);o2.start(now+0.2);o2.stop(now+0.25);break}
      case'buy':{const o=audioCtx.createOscillator();o.frequency.setValueAtTime(400,now);o.frequency.exponentialRampToValueAtTime(800,now+0.15);o.connect(g);o.start(now);o.stop(now+0.15);break}
      case'waveStart':{const o=audioCtx.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(200,now);o.frequency.exponentialRampToValueAtTime(600,now+0.5);o.connect(g);o.start(now);o.stop(now+0.5);break}
      case'footstep':{const n=makeNoise(0.04);n.connect(g);g.gain.value=vol*0.1;break}
      case'knife':{const n=makeNoise(0.08);const o=audioCtx.createOscillator();o.frequency.setValueAtTime(2000,now);o.frequency.exponentialRampToValueAtTime(500,now+0.08);o.connect(g);o.start(now);o.stop(now+0.08);n.connect(g);break}
    }
  }catch(e){}
}

function makeNoise(dur){
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*dur,audioCtx.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
  const src=audioCtx.createBufferSource();src.buffer=buf;src.start();return src;
}

// ===================== PLAYER CONTROLS =====================
function updatePlayer(dt){
  const perkSpeed = PERKS.speed.owned ? 1.15 : 1;
  let speed = MOVE_SPEED * perkSpeed;
  if(isSprinting && !isCrouching) speed *= SPRINT_MULT;
  if(isCrouching && !isSliding) speed *= CROUCH_MULT;

  const forward = new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
  const right = new THREE.Vector3(forward.z,0,-forward.x);
  const moveDir = new THREE.Vector3();

  if(keys['KeyW']||keys['ArrowUp']) moveDir.add(forward);
  if(keys['KeyS']||keys['ArrowDown']) moveDir.sub(forward);
  if(keys['KeyA']||keys['ArrowLeft']) moveDir.sub(right);
  if(keys['KeyD']||keys['ArrowRight']) moveDir.add(right);

  // Sliding
  if(isSliding){
    slideTimer -= dt;
    if(slideTimer <= 0){isSliding = false;isCrouching = true}
    else{
      const sf = slideTimer/SLIDE_DUR;
      playerVel.x = slideDir.x * SLIDE_SPEED * sf;
      playerVel.z = slideDir.z * SLIDE_SPEED * sf;
    }
  } else if(moveDir.lengthSq()>0){
    moveDir.normalize();
    playerVel.x = lerp(playerVel.x,moveDir.x*speed,dt*10);
    playerVel.z = lerp(playerVel.z,moveDir.z*speed,dt*10);
    walkCycle += dt * speed * 0.4;
    // Footstep sounds
    if(Math.sin(walkCycle*Math.PI)>0.95) playSound('footstep',0.5);
  } else {
    playerVel.x *= (1-dt*8);
    playerVel.z *= (1-dt*8);
  }

  // Crouch height
  const targetH = isCrouching||isSliding ? CROUCH_HEIGHT : PLAYER_HEIGHT;
  currentHeight = lerp(currentHeight,targetH,dt*10);

  // Gravity + Jump
  playerVel.y += GRAVITY * dt;
  if(keys['Space'] && onGround){playerVel.y = JUMP_VEL;onGround=false}

  // Apply velocity
  const newX = playerPos.x + playerVel.x*dt;
  const newZ = playerPos.z + playerVel.z*dt;
  const newY = playerPos.y + playerVel.y*dt;

  // Collision
  let blocked = false;
  const near = getCollidablesNear(newX,newZ);
  const pr = 0.3;
  for(const c of near){
    if(newX+pr>c.minX && newX-pr<c.maxX && newZ+pr>c.minZ && newZ-pr<c.maxZ && playerPos.y<c.h){
      // Push out
      const overlapL=newX+pr-c.minX,overlapR=c.maxX-(newX-pr);
      const overlapF=newZ+pr-c.minZ,overlapB=c.maxZ-(newZ-pr);
      const minO=Math.min(overlapL,overlapR,overlapF,overlapB);
      if(minO===overlapL){playerVel.x=0;playerPos.x=c.minX-pr}
      else if(minO===overlapR){playerVel.x=0;playerPos.x=c.maxX+pr}
      else if(minO===overlapF){playerVel.z=0;playerPos.z=c.minZ-pr}
      else{playerVel.z=0;playerPos.z=c.maxZ+pr}
      blocked=true;
    }
  }
  if(!blocked){playerPos.x=newX;playerPos.z=newZ}

  playerPos.y = newY;
  if(playerPos.y < currentHeight){playerPos.y=currentHeight;playerVel.y=0;onGround=true}

  // Map bounds
  playerPos.x=clamp(playerPos.x,-MAP_HALF+1,MAP_HALF-1);
  playerPos.z=clamp(playerPos.z,-MAP_HALF+1,MAP_HALF-1);
}

function updateCamera(){
  // Mouse look
  yaw -= mouseDX * MOUSE_SENS;
  pitch -= mouseDY * MOUSE_SENS;
  pitch = clamp(pitch,-Math.PI/2+0.05,Math.PI/2-0.05);
  mouseDX=0;mouseDY=0;

  // Recoil
  const rp = weaponState.recoilPitch;
  const ry = weaponState.recoilYaw;
  weaponState.recoilPitch = lerp(rp,0,0.1);
  weaponState.recoilYaw = lerp(ry,0,0.1);

  camera.position.copy(playerPos);

  // Lean
  if(keys['KeyQ']&&!keys['KeyE']) leanState=lerp(leanState,-1,0.15);
  else if(keys['KeyE']&&!keys['KeyQ']) leanState=lerp(leanState,1,0.15);
  else leanState=lerp(leanState,0,0.15);
  const leanRight = new THREE.Vector3(-Math.cos(yaw),0,Math.sin(yaw));
  camera.position.add(leanRight.multiplyScalar(leanState*LEAN_OFFSET));

  camera.rotation.order='YXZ';
  camera.rotation.y=yaw;
  camera.rotation.x=pitch+rp;
  camera.rotation.z=leanState*LEAN_ANGLE;

  // Screen shake
  if(screenShake>0){
    camera.position.x+=rand(-screenShake,screenShake);
    camera.position.y+=rand(-screenShake,screenShake);
    screenShake*=0.85;
    if(screenShake<0.005)screenShake=0;
  }

  // ADS
  const adsTarget = weaponState.isADS?1:0;
  weaponState.adsLerp=lerp(weaponState.adsLerp,adsTarget,0.15);
  const activeWpn = getActiveWeapon();
  if(activeWpn){
    const zoom = WEAPONS[activeWpn].adsZoom;
    camera.fov = lerp(75,75*zoom,weaponState.adsLerp);
    camera.updateProjectionMatrix();
  }

  // Weapon bob
  if(weaponMesh){
    const bob = Math.sin(walkCycle*2)*0.008*(1-weaponState.adsLerp);
    const sway = Math.cos(walkCycle)*0.005*(1-weaponState.adsLerp);
    const adsX = lerp(0.25,0,weaponState.adsLerp);
    const adsY = lerp(-0.2,-0.15,weaponState.adsLerp);
    const adsZ = lerp(-0.4,-0.3,weaponState.adsLerp);
    weaponMesh.position.set(adsX+sway,adsY+bob,adsZ);

    // Muzzle flash fade
    if(weaponState.muzzleFlash>0) weaponState.muzzleFlash-=0.2;
  }
}

function getActiveWeapon(){
  if(inventory.activeSlot===0)return inventory.primary;
  if(inventory.activeSlot===1)return inventory.secondary;
  return null;
}

// ===================== SHOOTING =====================
function updateWeapon(dt){
  weaponState.fireTimer-=dt;
  if(weaponState.fireTimer<0)weaponState.fireTimer=0;

  // Reload
  if(weaponState.reloading){
    weaponState.reloadTimer-=dt;
    if(weaponState.reloadTimer<=0){
      weaponState.reloading=false;
      const wpn=getActiveWeapon();
      if(wpn){
        const w=WEAPONS[wpn],a=inventory.ammo[wpn];
        const need=w.magSize-a.mag;
        const take=Math.min(need,a.reserve);
        a.mag+=take;a.reserve-=take;
      }
    }
    return;
  }

  const wpn=getActiveWeapon();
  if(!wpn)return;
  const w=WEAPONS[wpn],a=inventory.ammo[wpn];

  // Auto-reload on empty
  if(a.mag<=0&&a.reserve>0){startReload();return}

  // Fire
  const canFire = w.auto ? mouseLeft : mouseClicked;
  if(canFire&&weaponState.fireTimer<=0&&a.mag>0&&!weaponState.swapping){
    fire(wpn);
    mouseClicked=false;
  }

  // Manual reload
  if(keys['KeyR']&&a.mag<w.magSize&&a.reserve>0&&!weaponState.reloading) startReload();

  // Weapon swap
  if(weaponState.swapping){
    weaponState.swapTimer-=dt;
    if(weaponState.swapTimer<=0){weaponState.swapping=false}
  }
}

function startReload(){
  const wpn=getActiveWeapon();if(!wpn)return;
  const w=WEAPONS[wpn];
  weaponState.reloading=true;
  weaponState.reloadTimer=w.reload*(PERKS.fastReload.owned?0.7:1);
  playSound('reload');
}

function fire(wpnKey){
  const w=WEAPONS[wpnKey],a=inventory.ammo[wpnKey];
  a.mag--;
  weaponState.fireTimer=w.fireRate;

  const dmgMult = PERKS.damage.owned?1.2:1;
  const spreadMult = weaponState.isADS?0.4:1;

  // Sound
  const soundMap={pistol:'pistol',smg:'smg',shotgun:'shotgun',rifle:'rifle',sniper:'sniper',heavy:'heavy'};
  playSound(soundMap[w.cat]||'rifle');

  // Muzzle flash particles
  const muzzlePos = new THREE.Vector3();
  camera.getWorldPosition(muzzlePos);
  const fwd=new THREE.Vector3(0,0,-1);fwd.applyQuaternion(camera.quaternion);
  muzzlePos.add(fwd.clone().multiplyScalar(1));
  spawnParticles(muzzlePos.x,muzzlePos.y,muzzlePos.z,'muzzleFlash',3);
  spawnParticles(muzzlePos.x+fwd.x*0.3,muzzlePos.y,muzzlePos.z+fwd.z*0.3,'brass',1);

  // Recoil
  weaponState.recoilPitch+=w.spread*2;
  weaponState.recoilYaw+=rand(-w.spread,w.spread);
  screenShake=Math.max(screenShake,w.spread*0.5);
  weaponState.muzzleFlash=1;

  if(w.explosive){
    // RPG projectile
    fireProjectile(wpnKey);
    return;
  }

  const pellets=w.pellets||1;
  for(let p=0;p<pellets;p++){
    const dir=new THREE.Vector3(0,0,-1);
    dir.x+=rand(-w.spread,w.spread)*spreadMult;
    dir.y+=rand(-w.spread,w.spread)*spreadMult;
    dir.applyQuaternion(camera.quaternion);
    dir.normalize();

    const ray=new THREE.Raycaster(camera.position.clone(),dir,0,w.range);

    // Check enemies
    let hitEnemy=false;
    for(let i=0;i<enemies.length;i++){
      const e=enemies[i];if(e.dead)continue;
      const hits=ray.intersectObject(e.mesh,true);
      if(hits.length>0){
        const hitPt=hits[0].point;
        const headshot=hitPt.y>(e.mesh.position.y+1.3);
        const dmg=Math.round(w.dmg*(headshot?2:1)*dmgMult);
        damageEnemy(i,dmg,hitPt,headshot);
        hitEnemy=true;
        break;
      }
    }
    if(!hitEnemy){
      // Hit world
      const worldHits=ray.intersectObjects(collidables.map(c=>c.obj),true);
      if(worldHits.length>0){
        const hp=worldHits[0].point;
        spawnParticles(hp.x,hp.y,hp.z,'impact',3);
      }
    }
  }
}

function fireProjectile(wpnKey){
  const dir=new THREE.Vector3(0,0,-1);dir.applyQuaternion(camera.quaternion);
  const pos=camera.position.clone();
  const mesh=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.08,0.4,6),new THREE.MeshStandardMaterial({color:0x555500,emissive:0x332200}));
  mesh.rotation.x=Math.PI/2;
  scene.add(mesh);
  const w=WEAPONS[wpnKey];
  projectiles.push({pos:pos.clone(),vel:dir.multiplyScalar(40),mesh,damage:w.dmg,blastRadius:w.blastRadius,life:5});
}

// ===================== GRENADE =====================
function throwGrenade(){
  if(inventory.grenades<=0)return;
  inventory.grenades--;
  const dir=new THREE.Vector3(0,0.3,-1);dir.applyQuaternion(camera.quaternion);
  const pos=camera.position.clone();
  const mesh=new THREE.Mesh(new THREE.SphereGeometry(0.1,8,8),new THREE.MeshStandardMaterial({color:0x334422}));
  scene.add(mesh);
  projectiles.push({pos:pos.clone(),vel:dir.multiplyScalar(20),mesh,damage:100,blastRadius:6,life:3,grenade:true,bounces:true});
  playSound('rifle',0.5);
}

// ===================== KNIFE =====================
function knifeAttack(){
  playSound('knife');
  const dir=new THREE.Vector3(0,0,-1);dir.applyQuaternion(camera.quaternion);
  const ray=new THREE.Raycaster(camera.position.clone(),dir,0,2.5);
  for(let i=0;i<enemies.length;i++){
    const e=enemies[i];if(e.dead)continue;
    const hits=ray.intersectObject(e.mesh,true);
    if(hits.length>0){damageEnemy(i,50,hits[0].point,false);break}
  }
}

// ===================== PROJECTILES =====================
function updateProjectiles(dt){
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];
    p.vel.y+=GRAVITY*dt*(p.grenade?1:0.2);
    p.pos.add(p.vel.clone().multiplyScalar(dt));
    p.mesh.position.copy(p.pos);
    p.life-=dt;

    if(p.grenade) spawnParticles(p.pos.x,p.pos.y,p.pos.z,'smoke',1);

    // Ground bounce
    if(p.pos.y<0.1&&p.bounces){
      p.pos.y=0.1;p.vel.y*=-0.4;p.vel.x*=0.7;p.vel.z*=0.7;
    }

    let explode=false;
    if(p.life<=0)explode=true;
    if(p.pos.y<0.05&&!p.bounces)explode=true;

    // Hit enemy (RPG)
    if(!p.grenade){
      for(const e of enemies){
        if(e.dead)continue;
        if(e.mesh.position.distanceTo(p.pos)<1.5){explode=true;break}
      }
    }

    if(explode){
      doExplosion(p.pos,p.damage,p.blastRadius);
      scene.remove(p.mesh);
      projectiles.splice(i,1);
    }
  }
}

function doExplosion(pos,damage,radius){
  playSound('explosion');
  spawnParticles(pos.x,pos.y,pos.z,'explosion',30);
  spawnParticles(pos.x,pos.y,pos.z,'smoke',15);
  screenShake=0.3;

  // Damage enemies
  for(let i=0;i<enemies.length;i++){
    const e=enemies[i];if(e.dead)continue;
    const d=e.mesh.position.distanceTo(pos);
    if(d<radius){
      const falloff=1-d/radius;
      damageEnemy(i,Math.round(damage*falloff),pos,false);
    }
  }
  // Damage player
  const pd=playerPos.distanceTo(pos);
  if(pd<radius){
    const falloff=1-pd/radius;
    takeDamage(Math.round(damage*falloff*0.5));
  }
}

// ===================== ENEMIES =====================
function createEnemy(type,x,z){
  const et=ENEMY_TYPES[type];
  const mesh=new THREE.Group();
  const mat=new THREE.MeshStandardMaterial({color:et.color,roughness:0.8});
  const skinMat=new THREE.MeshStandardMaterial({color:0xc4a882,roughness:0.7});

  // Body
  const torso=new THREE.Mesh(new THREE.BoxGeometry(0.6,0.8,0.35),mat);
  torso.position.y=1.2;torso.castShadow=true;mesh.add(torso);
  // Head
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.18,8,8),skinMat);
  head.position.y=1.85;head.castShadow=true;mesh.add(head);
  // Helmet for heavy
  if(type==='heavy'){
    const helmet=new THREE.Mesh(new THREE.SphereGeometry(0.21,8,8),new THREE.MeshStandardMaterial({color:0x333333}));
    helmet.position.y=1.92;helmet.scale.set(1,0.7,1);mesh.add(helmet);
  }
  // Legs
  const legMat=new THREE.MeshStandardMaterial({color:0x3a3a2a});
  const ll=new THREE.Mesh(new THREE.BoxGeometry(0.18,0.6,0.2),legMat);ll.position.set(-0.12,0.4,0);mesh.add(ll);
  const rl=new THREE.Mesh(new THREE.BoxGeometry(0.18,0.6,0.2),legMat);rl.position.set(0.12,0.4,0);mesh.add(rl);
  // Arms
  const la=new THREE.Mesh(new THREE.BoxGeometry(0.15,0.55,0.18),mat);la.position.set(-0.4,1.15,0);mesh.add(la);
  const ra=new THREE.Mesh(new THREE.BoxGeometry(0.15,0.55,0.18),mat);ra.position.set(0.4,1.15,0);mesh.add(ra);

  mesh.position.set(x,0,z);
  scene.add(mesh);

  enemies.push({
    type,mesh,hp:et.hp,maxHp:et.hp,
    vel:new THREE.Vector3(),
    state:'chase',fireTimer:rand(0.5,2),
    dead:false,deathTimer:0,
    staggerTimer:0,
    walkCycle:rand(0,Math.PI*2)
  });
  enemiesAlive++;
}

function damageEnemy(idx,dmg,hitPt,headshot){
  const e=enemies[idx];
  e.hp-=dmg;
  spawnParticles(hitPt.x,hitPt.y,hitPt.z,'blood',headshot?8:4);
  e.staggerTimer=0.15;e.state='stagger';

  // Hitmarker
  const hm=document.getElementById('hitmarker');
  hm.style.opacity='1';hm.style.color=e.hp<=0?'#f44':'#fff';
  setTimeout(()=>hm.style.opacity='0',150);
  playSound('hit');

  if(e.hp<=0){
    killEnemy(idx);
  }
}

function killEnemy(idx){
  const e=enemies[idx];
  e.dead=true;e.deathTimer=5;
  enemiesAlive--;
  const et=ENEMY_TYPES[e.type];
  kills++;totalKills++;
  money+=et.reward;
  playSound('kill');

  // Kill feed
  addKillFeed(et.name+' +$'+et.reward);

  // Drop loot
  const dc=PERKS.scavenger.owned?et.dropChance*2:et.dropChance;
  if(Math.random()<dc){
    const pos=e.mesh.position.clone();
    if(Math.random()<0.5) spawnWeaponPickup(pos.x,pos.z,et.tier);
    else if(Math.random()<0.5) spawnPickup(pos.x,0.5,pos.z,'health');
    else spawnPickup(pos.x,0.5,pos.z,'ammo');
  }

  // Ragdoll-like: just tip over
  e.mesh.rotation.x = Math.PI/2*0.8;
  e.mesh.position.y = 0.3;
}

function updateEnemies(dt){
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if(e.dead){
      e.deathTimer-=dt;
      if(e.deathTimer<=0){scene.remove(e.mesh);enemies.splice(i,1)}
      continue;
    }

    const et=ENEMY_TYPES[e.type];
    const dx=playerPos.x-e.mesh.position.x;
    const dz=playerPos.z-e.mesh.position.z;
    const dist=Math.sqrt(dx*dx+dz*dz);
    const angle=Math.atan2(dx,dz);

    // Stagger
    if(e.state==='stagger'){
      e.staggerTimer-=dt;
      if(e.staggerTimer<=0) e.state='chase';
      continue;
    }

    // Face player
    e.mesh.rotation.y=angle;

    // Walk animation
    e.walkCycle+=dt*et.speed;
    const legAngle=Math.sin(e.walkCycle*3)*0.4;
    if(e.mesh.children[3])e.mesh.children[3].rotation.x=legAngle;
    if(e.mesh.children[4])e.mesh.children[4].rotation.x=-legAngle;

    if(e.type==='rusher'){
      // Rush toward player
      if(dist>et.range){
        const spd=et.speed*dt;
        e.mesh.position.x+=Math.sin(angle)*spd;
        e.mesh.position.z+=Math.cos(angle)*spd;
      } else {
        // Melee attack
        e.fireTimer-=dt;
        if(e.fireTimer<=0){
          takeDamage(et.damage);
          e.fireTimer=0.8;
        }
      }
    } else {
      // Move toward player if too far
      if(dist>et.range*0.7){
        const spd=et.speed*dt;
        const nx=e.mesh.position.x+Math.sin(angle)*spd;
        const nz=e.mesh.position.z+Math.cos(angle)*spd;
        // Simple collision check
        let canMove=true;
        const near2=getCollidablesNear(nx,nz);
        for(const c of near2){
          if(nx+0.4>c.minX&&nx-0.4<c.maxX&&nz+0.4>c.minZ&&nz-0.4<c.maxZ){canMove=false;break}
        }
        if(canMove){e.mesh.position.x=nx;e.mesh.position.z=nz}
        else{
          // Try to go around
          const sideX=e.mesh.position.x+Math.sin(angle+Math.PI/3)*spd;
          const sideZ=e.mesh.position.z+Math.cos(angle+Math.PI/3)*spd;
          e.mesh.position.x=sideX;e.mesh.position.z=sideZ;
        }
      }

      // Shoot at player
      if(dist<et.range){
        e.fireTimer-=dt;
        if(e.fireTimer<=0){
          // LOS check
          const origin=e.mesh.position.clone();origin.y+=1.5;
          const dirToPlayer=new THREE.Vector3(dx,playerPos.y-origin.y,dz).normalize();
          const losRay=new THREE.Raycaster(origin,dirToPlayer,0,dist);
          const wallHits=losRay.intersectObjects(collidables.map(c=>c.obj),true);
          if(wallHits.length===0||wallHits[0].distance>dist-0.5){
            // Fire at player with accuracy offset
            const hit=Math.random()>et.accuracy*dist*0.05;
            if(hit){takeDamage(et.damage)}
            playSound(et.fireRate>1?'sniper':'rifle',0.3);
            spawnParticles(origin.x,origin.y,origin.z,'muzzleFlash',2);
            e.fireTimer=et.fireRate+rand(-0.2,0.2);
          } else {
            e.fireTimer=0.3; // retry soon
          }
        }
      }
    }

    // Keep in bounds
    e.mesh.position.x=clamp(e.mesh.position.x,-MAP_HALF+1,MAP_HALF-1);
    e.mesh.position.z=clamp(e.mesh.position.z,-MAP_HALF+1,MAP_HALF-1);
  }
}

function takeDamage(dmg){
  if(armor>0){const absorbed=Math.min(dmg*0.6,armor);armor-=absorbed;dmg-=absorbed}
  health-=dmg;
  damageVignetteTimer=0.3;
  document.getElementById('damageVignette').style.opacity='0.6';
  screenShake=Math.max(screenShake,0.1);
  if(health<=0){health=0;playerDeath()}
}

function playerDeath(){
  mode='dead';
  document.exitPointerLock();
  document.getElementById('deathScreen').style.display='flex';
  document.getElementById('deathStats').innerHTML=`Wave: ${wave}<br>Kills: ${totalKills}<br>Money earned: $${money}`;
}

// ===================== PICKUPS =====================
function spawnWeaponPickup(x,z,tier){
  const tierWeapons={
    1:['m9','glock','uzi','mp5'],
    2:['deagle','p90','vector','pump','spas12','m4a1','ak47','famas'],
    3:['scarh','autoshotgun','awp','m24','barrett','rpg','minigun','lmg']
  };
  const pool=tierWeapons[tier]||tierWeapons[1];
  const wpnKey=pool[randInt(0,pool.length-1)];
  spawnPickup(x,0.5,z,'weapon',wpnKey);
}

function spawnPickup(x,y,z,type,data){
  const colors={weapon:0xff8800,health:0x44ff44,ammo:0xffff44,armor:0x4488ff,grenade:0xff4444};
  const mat=new THREE.MeshStandardMaterial({color:colors[type]||0xffffff,emissive:colors[type]||0xffffff,emissiveIntensity:0.3});
  let mesh;
  if(type==='weapon'){
    mesh=new THREE.Mesh(new THREE.BoxGeometry(0.6,0.2,0.2),mat);
  }else if(type==='health'){
    mesh=new THREE.Mesh(new THREE.BoxGeometry(0.4,0.4,0.4),mat);
  }else if(type==='ammo'){
    mesh=new THREE.Mesh(new THREE.BoxGeometry(0.35,0.25,0.35),mat);
  }else if(type==='armor'){
    mesh=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.3,0.4),mat);
  }else{
    mesh=new THREE.Mesh(new THREE.SphereGeometry(0.2,8,8),mat);
  }
  mesh.position.set(x,y,z);mesh.castShadow=true;
  scene.add(mesh);
  pickups.push({type,data,mesh,time:0});
}

function updatePickups(dt){
  for(let i=pickups.length-1;i>=0;i--){
    const p=pickups[i];
    p.time+=dt;
    p.mesh.rotation.y+=dt*2;
    p.mesh.position.y=0.5+Math.sin(p.time*3)*0.1;

    const dx=playerPos.x-p.mesh.position.x;
    const dz=playerPos.z-p.mesh.position.z;
    if(dx*dx+dz*dz<2.5){
      let picked=false;
      switch(p.type){
        case'health':health=Math.min(health+30,maxHealth);picked=true;break;
        case'ammo':{
          const wpn=getActiveWeapon();
          if(wpn){inventory.ammo[wpn].reserve+=WEAPONS[wpn].magSize;picked=true}
          break}
        case'armor':armor=Math.min(armor+50,100);picked=true;break;
        case'grenade':inventory.grenades=Math.min(inventory.grenades+2,6);picked=true;break;
        case'weapon':{
          const wpnKey=p.data;
          if(!inventory.primary){
            inventory.primary=wpnKey;
            inventory.ammo[wpnKey]={mag:WEAPONS[wpnKey].magSize,reserve:WEAPONS[wpnKey].magSize*2};
            inventory.activeSlot=0;createWeaponModel(wpnKey);picked=true;
          }else if(!inventory.secondary){
            inventory.secondary=wpnKey;
            inventory.ammo[wpnKey]={mag:WEAPONS[wpnKey].magSize,reserve:WEAPONS[wpnKey].magSize*2};
            picked=true;
          }else if(keys['KeyF']){
            // Swap with active weapon
            const slot=inventory.activeSlot===0?'primary':'secondary';
            const old=inventory[slot];
            inventory[slot]=wpnKey;
            inventory.ammo[wpnKey]={mag:WEAPONS[wpnKey].magSize,reserve:WEAPONS[wpnKey].magSize*2};
            createWeaponModel(wpnKey);
            // Drop old weapon
            spawnPickup(playerPos.x,0.5,playerPos.z,'weapon',old);
            picked=true;
          }
          break}
      }
      if(picked){
        playSound('buy',0.5);
        scene.remove(p.mesh);pickups.splice(i,1);
      }
    }
  }
}

function spawnInitialPickups(){
  gunSpawnPoints.forEach(sp=>{
    spawnWeaponPickup(sp.x,sp.z,sp.tier);
  });
  // Some health and ammo
  for(let i=0;i<5;i++){
    spawnPickup(rand(-MAP_HALF+5,MAP_HALF-5),0.5,rand(-MAP_HALF+5,MAP_HALF-5),'health');
    spawnPickup(rand(-MAP_HALF+5,MAP_HALF-5),0.5,rand(-MAP_HALF+5,MAP_HALF-5),'ammo');
  }
}

// ===================== WAVE SYSTEM =====================
function getWaveConfig(w){
  return{
    grunt:Math.min(3+w*2,15),
    rusher:Math.max(0,Math.floor((w-1)*1.5)),
    heavy:Math.max(0,Math.floor((w-2)*0.8)),
    sniper:Math.max(0,Math.floor((w-3)*0.7)),
    officer:Math.max(0,Math.floor((w-4)*0.5))
  };
}

function startNextWave(){
  wave++;
  mode='waveIntro';
  waveAnnounceTimer=3;
  const announce=document.getElementById('waveAnnounce');
  announce.textContent='WAVE '+wave;
  announce.style.opacity='1';
  announce.style.transition='none';
  playSound('waveStart');
}

function spawnWave(){
  const cfg=getWaveConfig(wave);
  const hpScale=wave>5?1+(wave-5)*0.1:1;
  const types=Object.entries(cfg);
  types.forEach(([type,count])=>{
    for(let i=0;i<count;i++){
      const sp=spawnPoints[randInt(0,spawnPoints.length-1)];
      const ox=rand(-3,3),oz=rand(-3,3);
      const e=type;
      createEnemy(e,sp.x+ox,sp.z+oz);
      // Scale HP for later waves
      if(hpScale>1)enemies[enemies.length-1].hp*=hpScale;
      enemies[enemies.length-1].maxHp=enemies[enemies.length-1].hp;
    }
  });
}

function checkWaveComplete(){
  if(enemiesAlive<=0&&mode==='playing'){
    money+=wave*100; // wave bonus
    addKillFeed('Wave '+wave+' complete! +$'+wave*100);
    openBuyMenu();
  }
}

// ===================== BUY MENU =====================
let buyTab='weapons';
function openBuyMenu(){
  mode='buying';
  document.exitPointerLock();
  document.getElementById('buyMenu').style.display='flex';
  document.getElementById('buyMenu').style.pointerEvents='auto';
  renderBuyMenu();
}

function closeBuyMenu(){
  document.getElementById('buyMenu').style.display='none';
  document.body.requestPointerLock();
  // Spawn some pickups between waves
  for(let i=0;i<3;i++){
    spawnPickup(rand(-MAP_HALF+5,MAP_HALF-5),0.5,rand(-MAP_HALF+5,MAP_HALF-5),'health');
    spawnPickup(rand(-MAP_HALF+5,MAP_HALF-5),0.5,rand(-MAP_HALF+5,MAP_HALF-5),'ammo');
  }
  startNextWave();
}

function renderBuyMenu(){
  const tabs=document.getElementById('buyTabs');
  const grid=document.getElementById('buyGrid');
  tabs.innerHTML='';grid.innerHTML='';

  ['weapons','ammo','equipment','perks'].forEach(t=>{
    const btn=document.createElement('button');
    btn.textContent=t.charAt(0).toUpperCase()+t.slice(1);
    if(t===buyTab)btn.className='active';
    btn.onclick=()=>{buyTab=t;renderBuyMenu()};
    tabs.appendChild(btn);
  });

  if(buyTab==='weapons'){
    WEAPON_KEYS.forEach(k=>{
      const w=WEAPONS[k];
      const owned=inventory.primary===k||inventory.secondary===k;
      const canAfford=money>=w.cost;
      const div=document.createElement('div');
      div.className='buyItem'+(owned?' owned':'')+((!canAfford&&!owned)?' cantAfford':'');
      div.innerHTML=`<div class="itemName">${w.name}</div><div class="itemCost">${owned?'OWNED':'$'+w.cost}</div><div class="itemDesc">${w.cat} | DMG:${w.dmg} | MAG:${w.magSize}</div>`;
      if(!owned&&canAfford) div.onclick=()=>buyWeapon(k);
      grid.appendChild(div);
    });
  }else if(buyTab==='ammo'){
    [inventory.primary,inventory.secondary].filter(Boolean).forEach(k=>{
      const w=WEAPONS[k],a=inventory.ammo[k];
      const div=document.createElement('div');
      div.className='buyItem'+(money<w.ammoCost?' cantAfford':'');
      div.innerHTML=`<div class="itemName">${w.name} Ammo</div><div class="itemCost">$${w.ammoCost}</div><div class="itemDesc">Reserve: ${a.reserve} (+${w.magSize*2})</div>`;
      if(money>=w.ammoCost) div.onclick=()=>{money-=w.ammoCost;a.reserve+=w.magSize*2;playSound('buy');renderBuyMenu()};
      grid.appendChild(div);
    });
  }else if(buyTab==='equipment'){
    [{name:'Grenades',cost:200,desc:'x2 grenades',fn:()=>{inventory.grenades=Math.min(inventory.grenades+2,6)}},
     {name:'Armor Plate',cost:500,desc:'+50 armor',fn:()=>{armor=Math.min(armor+50,100)}},
     {name:'Health Kit',cost:300,desc:'Full heal',fn:()=>{health=maxHealth}}
    ].forEach(item=>{
      const div=document.createElement('div');
      div.className='buyItem'+(money<item.cost?' cantAfford':'');
      div.innerHTML=`<div class="itemName">${item.name}</div><div class="itemCost">$${item.cost}</div><div class="itemDesc">${item.desc}</div>`;
      if(money>=item.cost) div.onclick=()=>{money-=item.cost;item.fn();playSound('buy');renderBuyMenu()};
      grid.appendChild(div);
    });
  }else if(buyTab==='perks'){
    Object.entries(PERKS).forEach(([k,p])=>{
      const div=document.createElement('div');
      div.className='buyItem'+(p.owned?' owned':'')+((!p.owned&&money<p.cost)?' cantAfford':'');
      div.innerHTML=`<div class="itemName">${p.name}</div><div class="itemCost">${p.owned?'OWNED':'$'+p.cost}</div><div class="itemDesc">${p.desc}</div>`;
      if(!p.owned&&money>=p.cost) div.onclick=()=>{money-=p.cost;p.owned=true;if(k==='extraHealth'){maxHealth=150;health=maxHealth}playSound('buy');renderBuyMenu()};
      grid.appendChild(div);
    });
  }
}

function buyWeapon(key){
  const w=WEAPONS[key];
  if(money<w.cost)return;
  money-=w.cost;
  if(!inventory.primary){inventory.primary=key;inventory.activeSlot=0}
  else if(!inventory.secondary){inventory.secondary=key;inventory.activeSlot=1}
  else{
    const slot=inventory.activeSlot===0?'primary':'secondary';
    inventory[slot]=key;
  }
  inventory.ammo[key]={mag:w.magSize,reserve:w.magSize*3};
  createWeaponModel(key);
  playSound('buy');
  renderBuyMenu();
}

// ===================== HUD =====================
function updateHUD(){
  document.getElementById('healthFill').style.width=(health/maxHealth*100)+'%';
  document.getElementById('healthFill').style.background=health>60?'#4a4':health>30?'#aa4':'#a44';
  document.getElementById('armorFill').style.width=(armor)+'%';
  const wpn=getActiveWeapon();
  if(wpn){
    const a=inventory.ammo[wpn];
    document.getElementById('ammoDisplay').innerHTML=`<div id="weaponName">${WEAPONS[wpn].name}${weaponState.reloading?' (RELOADING)':''}</div><span class="mag">${a.mag}</span> / ${a.reserve}`;
  }else if(inventory.activeSlot===2){
    document.getElementById('ammoDisplay').innerHTML='<div id="weaponName">Knife</div>';
  }
  document.getElementById('waveInfo').textContent='WAVE '+wave;
  document.getElementById('killCount').textContent='Kills: '+totalKills;
  document.getElementById('moneyDisplay').textContent='$'+money;

  // Damage vignette fade
  if(damageVignetteTimer>0){damageVignetteTimer-=0.016;if(damageVignetteTimer<=0)document.getElementById('damageVignette').style.opacity='0'}
}

function addKillFeed(text){
  const feed=document.getElementById('killFeed');
  const div=document.createElement('div');div.textContent=text;feed.appendChild(div);
  setTimeout(()=>{if(div.parentNode)div.parentNode.removeChild(div)},3000);
}

// ===================== MINIMAP =====================
function updateMinimap(){
  const c=document.getElementById('minimap');
  const ctx=c.getContext('2d');
  ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(0,0,140,140);
  const scale=140/(MAP_SIZE*2);
  const cx=70,cy=70;

  // Buildings
  ctx.fillStyle='#444';
  collidables.forEach(col=>{
    const x1=(col.minX+MAP_HALF)*scale,z1=(col.minZ+MAP_HALF)*scale;
    const w=(col.maxX-col.minX)*scale,h=(col.maxZ-col.minZ)*scale;
    ctx.fillRect(x1,z1,Math.max(w,1),Math.max(h,1));
  });

  // Pickups
  pickups.forEach(p=>{
    const px=(p.mesh.position.x+MAP_HALF)*scale;
    const pz=(p.mesh.position.z+MAP_HALF)*scale;
    ctx.fillStyle=p.type==='weapon'?'#f80':p.type==='health'?'#4f4':'#ff4';
    ctx.fillRect(px-1,pz-1,3,3);
  });

  // Enemies
  ctx.fillStyle='#f44';
  enemies.forEach(e=>{
    if(e.dead)return;
    const ex=(e.mesh.position.x+MAP_HALF)*scale;
    const ez=(e.mesh.position.z+MAP_HALF)*scale;
    ctx.fillRect(ex-2,ez-2,4,4);
  });

  // Player
  const px=(playerPos.x+MAP_HALF)*scale;
  const pz=(playerPos.z+MAP_HALF)*scale;
  ctx.fillStyle='#4f4';
  ctx.beginPath();ctx.arc(px,pz,3,0,Math.PI*2);ctx.fill();
  // Direction
  ctx.strokeStyle='#4f4';ctx.lineWidth=1.5;ctx.beginPath();
  ctx.moveTo(px,pz);
  ctx.lineTo(px-Math.sin(yaw)*8,pz-Math.cos(yaw)*8);
  ctx.stroke();
}

// ===================== INPUT =====================
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Escape'){
    if(mode==='playing')togglePause();
    else if(mode==='paused')togglePause();
  }
  if(mode==='playing'){
    if(e.code==='ShiftLeft'||e.code==='ShiftRight')isSprinting=true;
    if(e.code==='ControlLeft'||e.code==='ControlRight'){
      if(isSprinting&&!isCrouching&&onGround){
        // Slide
        isSliding=true;slideTimer=SLIDE_DUR;
        const fwd=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
        slideDir.copy(fwd);
        isSprinting=false;
      }
      isCrouching=true;
    }
    if(e.code==='Digit1'&&inventory.primary){inventory.activeSlot=0;createWeaponModel(inventory.primary);weaponState.swapping=true;weaponState.swapTimer=0.4}
    if(e.code==='Digit2'&&inventory.secondary){inventory.activeSlot=1;createWeaponModel(inventory.secondary);weaponState.swapping=true;weaponState.swapTimer=0.4}
    if(e.code==='Digit3'){inventory.activeSlot=2;createWeaponModel(null);weaponState.swapping=true;weaponState.swapTimer=0.3}
    if(e.code==='KeyG')throwGrenade();
    if(e.code==='KeyV')knifeAttack();
  }
  if(mode==='buying'&&e.code==='Escape')closeBuyMenu();
  e.preventDefault();
});
document.addEventListener('keyup',e=>{
  keys[e.code]=false;
  if(e.code==='ShiftLeft'||e.code==='ShiftRight')isSprinting=false;
  if(e.code==='ControlLeft'||e.code==='ControlRight'){isCrouching=false;isSliding=false}
});
document.addEventListener('mousemove',e=>{
  if(mode==='playing'){mouseDX+=e.movementX||0;mouseDY+=e.movementY||0}
});
document.addEventListener('mousedown',e=>{
  if(mode==='playing'&&e.button===0){mouseLeft=true;mouseClicked=true}
  if(mode==='playing'&&e.button===2){mouseRight=true;weaponState.isADS=true}
});
document.addEventListener('mouseup',e=>{
  if(e.button===0){mouseLeft=false}
  if(e.button===2){mouseRight=false;weaponState.isADS=false}
});
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('wheel',e=>{
  if(mode!=='playing')return;
  const dir=e.deltaY>0?1:-1;
  let slot=inventory.activeSlot+dir;
  if(slot<0)slot=2;if(slot>2)slot=0;
  if(slot===0&&!inventory.primary)slot+=dir;
  if(slot===1&&!inventory.secondary)slot+=dir;
  if(slot<0)slot=2;if(slot>2)slot=0;
  inventory.activeSlot=slot;
  const wpn=getActiveWeapon();
  createWeaponModel(wpn);
  weaponState.swapping=true;weaponState.swapTimer=0.4;
});
document.addEventListener('pointerlockchange',()=>{
  if(!document.pointerLockElement&&mode==='playing')togglePause();
});

function togglePause(){
  if(mode==='playing'){
    mode='paused';
    document.getElementById('pauseOverlay').style.display='flex';
  }else if(mode==='paused'){
    mode='playing';
    document.getElementById('pauseOverlay').style.display='none';
    document.body.requestPointerLock();
  }
}

// ===================== GAME FLOW =====================
function startGame(){
  if(!audioCtx)initAudio();
  document.getElementById('titleScreen').style.display='none';
  document.getElementById('hud').style.display='block';
  document.body.requestPointerLock();

  playerPos=new THREE.Vector3(0,PLAYER_HEIGHT,0);
  playerVel=new THREE.Vector3();
  health=100;maxHealth=100;armor=0;
  money=500;kills=0;totalKills=0;wave=0;
  inventory={primary:'m9',secondary:null,activeSlot:0,ammo:{m9:{mag:15,reserve:45}},grenades:2};
  Object.keys(PERKS).forEach(k=>PERKS[k].owned=false);
  enemies.forEach(e=>scene.remove(e.mesh));enemies.length=0;
  pickups.forEach(p=>scene.remove(p.mesh));pickups.length=0;
  projectiles.forEach(p=>scene.remove(p.mesh));projectiles.length=0;
  enemiesAlive=0;
  createWeaponModel('m9');
  spawnInitialPickups();
  startNextWave();
}

function restartGame(){
  document.getElementById('deathScreen').style.display='none';
  startGame();
}
window.restartGame=restartGame;

// ===================== GAME LOOP =====================
let frameCount=0;
function gameLoop(){
  requestAnimationFrame(gameLoop);
  let dt=clock.getDelta();
  dt=Math.min(dt,0.05);

  if(mode==='waveIntro'){
    waveAnnounceTimer-=dt;
    if(waveAnnounceTimer<=0){
      document.getElementById('waveAnnounce').style.transition='opacity 0.5s';
      document.getElementById('waveAnnounce').style.opacity='0';
      mode='playing';
      spawnWave();
    }
  }

  if(mode==='playing'){
    updatePlayer(dt);
    updateCamera();
    updateWeapon(dt);
    updateEnemies(dt);
    updateProjectiles(dt);
    updatePickups(dt);
    updateParticles(dt);
    updateHUD();
    checkWaveComplete();
    frameCount++;
    if(frameCount%5===0)updateMinimap();
  }

  if(mode==='paused'||mode==='buying'||mode==='dead'){
    // Still render but don't update
  }

  renderer.render(scene,camera);
}

// ===================== INIT =====================
function init(){
  initThree();
  initTextures();
  initParticles();
  generateMap();
  document.getElementById('titleScreen').addEventListener('click',startGame);
  document.getElementById('pauseOverlay').addEventListener('click',()=>{if(mode==='paused')togglePause()});
  document.getElementById('buyReady').addEventListener('click',closeBuyMenu);
  clock.start();
  gameLoop();
}
init();
</script>
